<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workspaces</title>
  <link rel="stylesheet" href="popup.css">
</head>
<!-- body starts invisible; JS makes it visible once content is ready -->
<body>
<div class="root">

  <!-- ── Main view ───────────────────────────────────────── -->
  <div id="vMain" class="v on">
    <div class="hdr">
      <span class="hdr-title">Workspaces</span>
      <span class="sync-dot" id="syncDot" title="Sync status unknown"></span>
    </div>
    <div class="quota-warn" id="quotaWarn"></div>
    <div class="ws-list" id="wsList"></div>
    <div class="btns">
      <button class="btn-row" id="btnFromTabs">
        <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="7" height="6" rx=".9" stroke="currentColor" stroke-width="1.2"/><rect x="6" y="6" width="7" height="6" rx=".9" stroke="currentColor" stroke-width="1.2"/><path d="M11 2.5v3M9.5 4h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        New from current tabs
      </button>
      <button class="btn-row" id="btnBlank">
        <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="7" height="6" rx=".9" stroke="currentColor" stroke-width="1.2"/><rect x="6" y="6" width="7" height="6" rx=".9" stroke="currentColor" stroke-width="1.2"/><path d="M9.5 8.5v3M8 10h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        New blank workspace
      </button>
      <div class="btns-io">
        <button class="btn-row btn-io" id="btnExport">
          <svg viewBox="0 0 14 14" fill="none"><path d="M7 1v7M4.5 5.5L7 8l2.5-2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10v1.5a.5.5 0 00.5.5h9a.5.5 0 00.5-.5V10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Export
        </button>
        <button class="btn-row btn-io" id="btnImport">
          <svg viewBox="0 0 14 14" fill="none"><path d="M7 9V2M4.5 5.5L7 3l2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10v1.5a.5.5 0 00.5.5h9a.5.5 0 00.5-.5V10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Import
        </button>
      </div>
    </div>
  </div>

  <!-- ── Form view (create + edit) ───────────────────────── -->
  <div id="vForm" class="v">
    <div class="hdr hdr-nav">
      <button class="btn-back" id="btnBack">
        <svg viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="hdr-title" id="formTitle">New workspace</span>
    </div>
    <div class="form">
      <label class="lbl" for="fName">Name</label>
      <input id="fName" class="inp" type="text" placeholder="Workspace name" maxlength="60" autocomplete="off" spellcheck="false"/>
      <label class="lbl">Color</label>
      <div class="color-row">
        <div class="swatches" id="swatches"></div>
        <label class="sw color-wheel" id="colorWheelBtn" title="Custom color">
          <input type="color" id="colorPicker">
        </label>
      </div>
      <div class="form-err" id="formErr"></div>
    </div>
    <div class="btns btns-row">
      <button class="btn-cancel" id="btnFormCancel">Cancel</button>
      <button class="btn-ok" id="btnFormOk">Create</button>
    </div>
  </div>

  <!-- ── Delete confirm ──────────────────────────────────── -->
  <div id="vDel" class="v">
    <div class="hdr"><span class="hdr-title">Delete workspace</span></div>
    <div class="form del-body">
      <p class="del-q">Delete <strong id="delName"></strong>?</p>
      <p class="del-sub">Saved tabs in this workspace will be lost.</p>
    </div>
    <div class="btns btns-row">
      <button class="btn-cancel" id="btnDelCancel">Cancel</button>
      <button class="btn-danger" id="btnDelOk">Delete</button>
    </div>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
